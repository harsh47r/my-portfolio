<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator Demo | Harsh Portfolio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; margin: 0; padding: 0; font-family: var(--font-body); }
        .project-hero {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding-top: 80px;
        }
        .header-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header-title h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .ai-layout {
            display: flex;
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 200px);
            margin: 0 auto;
            flex-direction: row-reverse;
        }
        
        .ai-sidebar {
            width: 280px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .history-item:hover, .history-item.active {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: var(--text-primary);
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
            pointer-events: none;
        }

        .delete-thread-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
            padding: 0;
            display: flex;
        }

        .delete-thread-btn:hover {
            color: #ef4444;
        }

        .history-item:hover .delete-thread-btn {
            opacity: 1;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .clear-history-btn {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .clear-history-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .ai-dashboard {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .chat-container {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }
        
        /* Scrollbar styles */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            opacity: 0;
            transform: translateY(20px);
            animation: messageFadeIn 0.5s forwards;
        }
        
        @keyframes messageFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar.user-avatar {
            background: rgba(255,255,255,0.1);
        }

        .avatar.ai-avatar {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            color: white;
            animation: pulseGlow 3s infinite alternate;
        }

        .message-content {
            padding: 1rem 1.2rem;
            border-radius: 16px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .user .message-content {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .prompt-container {
            padding: 1rem 2rem 2rem;
            position: relative;
        }

        .input-box {
            position: relative;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0.5rem 1.5rem;
            transition: 0.3s;
        }
        
        .input-box:focus-within {
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
            background: rgba(255,255,255,0.08);
        }

        .ai-input {
            flex-grow: 1;
            padding: 1rem 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1.1rem;
            outline: none;
        }

        .ai-input::placeholder {
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.1);
        }

        .send-btn {
            background: transparent;
            border: none;
            color: #d8b4fe;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn:hover {
            color: white;
            background: rgba(168, 85, 247, 0.2);
        }

        .stop-btn {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            margin: 0 auto;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .stop-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }
            100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.6); }
        }

        .generating-cursor {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d8b4fe;
            animation: blink 1s infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0; transform: scale(0.8); }
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 999;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: var(--gradient-1); border-color: transparent; scale: 1.1;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            opacity: 0.7;
        }
        
        .empty-state i {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .welcome-suggestions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .suggestion-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .suggestion-chip:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: white;
        }

    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <canvas id="particle-canvas"></canvas>

    <a href="index.html" class="back-btn"><i data-lucide="arrow-left"></i></a>

    <section class="project-hero container">
        <div class="header-title" data-aos="fade-down">
            <h1>Harsh <span class="gradient-text-3">GPT</span></h1>
            <p style="color:var(--text-secondary);">Interactive prompt generation simulation</p>
        </div>

        <div class="ai-layout" data-aos="zoom-in" data-aos-delay="200">
            <div class="ai-sidebar">
                <div class="sidebar-header">
                    <h3>Recent Chats</h3>
                    <button class="icon-btn" id="new-chat-btn" title="New Chat" style="width:30px;height:30px;"><i data-lucide="plus"></i></button>
                </div>
                <div class="sidebar-list" id="sidebar-list">
                    <!-- History gets injected here -->
                </div>
                <div class="sidebar-footer">
                    <button class="clear-history-btn" id="clear-all-btn"><i data-lucide="trash-2" style="width:16px;height:16px;"></i> Delete All</button>
                </div>
            </div>

            <div class="ai-dashboard">
                <div class="chat-container" id="chat-container">
                    <div class="empty-state" id="empty-state">
                        <i data-lucide="sparkles" style="color:#d8b4fe"></i>
                        <h2>Hello, Harsh</h2>
                        <p>How can I help you today?</p>
                        
                        <div class="welcome-suggestions">
                            <div class="suggestion-chip">Write a React component</div>
                            <div class="suggestion-chip">Explain Quantum Computing</div>
                            <div class="suggestion-chip">Draft an email for a job app</div>
                        </div>
                    </div>
                </div>

                <div class="prompt-container">
                    <button class="stop-btn" id="stop-btn"><i data-lucide="square" style="width:14px; height:14px; fill:currentColor;"></i> Stop generating</button>
                    <div class="input-box">
                        <input type="text" class="ai-input" id="prompt-input" autocomplete="off" placeholder="Enter a prompt here...">
                        <div class="controls">
                            <button class="icon-btn"><i data-lucide="image"></i></button>
                            <button class="icon-btn"><i data-lucide="mic"></i></button>
                            <button class="send-btn" id="generate-btn"><i data-lucide="send"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Essential Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        lucide.createIcons();

        // Gemini clone logic
        const btn = document.getElementById('generate-btn');
        const stopBtn = document.getElementById('stop-btn');
        const input = document.getElementById('prompt-input');
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        const chips = document.querySelectorAll('.suggestion-chip');
        
        // Sidebar Elements
        const sidebarList = document.getElementById('sidebar-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');

        let isGenerating = false;
        let typingInterval = null;

        // Data Models
        let allThreads = JSON.parse(localStorage.getItem('geminiThreads')) || [];
        let currentThreadId = null;
        let chatHistory = []; // Current thread session context

        // --- GEMINI API CONFIGURATION ---
        const GEMINI_API_KEY = "AIzaSyBkxlr8rZ0Hs8NGvT3DOaaHepz0i1MM8zs";

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function saveThreads() {
            localStorage.setItem('geminiThreads', JSON.stringify(allThreads));
            renderSidebar();
        }

        async function fetchGeminiResponse() {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "PLEASE_ADD_YOUR_API_KEY_HERE") {
                return "Developer note: Please add your actual Gemini API key to enable real AI responses.";
            }
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: chatHistory })
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);
                
                if (data.candidates && data.candidates.length > 0) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("Invalid response geometry from API.");
                }
            } catch (error) {
                console.error("Gemini API Error:", error);
                return "Error connecting to Gemini API: " + error.message;
            }
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>')
                .replace(/\n/g, '<br>');
        }

        function createMessage(text, isUser = false, animate = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            if (!animate) {
                msgDiv.style.opacity = '1';
                msgDiv.style.transform = 'translateY(0)';
                msgDiv.style.animation = 'none';
            }
            
            const avatarHtml = isUser 
                ? `<div class="avatar user-avatar"><i data-lucide="user"></i></div>`
                : `<div class="avatar ai-avatar"><i data-lucide="sparkles" style="width:20px;height:20px"></i></div>`;
            
            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-content">
                    <span class="text-content"></span>
                    ${!isUser && text === 'Thinking...' ? '<span class="generating-cursor" id="current-cursor"></span>' : ''}
                </div>
            `;
            
            const textContainer = msgDiv.querySelector('.text-content');
            if (isUser || (!animate && text !== 'Thinking...')) {
                textContainer.innerHTML = text.replace(/\n/g, '<br>');
            } else {
                textContainer.textContent = text;
            }
            
            chatContainer.appendChild(msgDiv);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        function renderSidebar() {
            sidebarList.innerHTML = '';
            if (allThreads.length === 0) {
                sidebarList.innerHTML = `<div style="text-align:center; padding: 2rem 0; color: rgba(255,255,255,0.3); font-size: 0.9rem;">No history yet</div>`;
            }
            allThreads.forEach(thread => {
                const item = document.createElement('div');
                item.className = 'history-item' + (currentThreadId === thread.id ? ' active' : '');
                item.innerHTML = `
                    <div class="history-title" title="${thread.title}">${thread.title}</div>
                    <button class="delete-thread-btn" title="Delete"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
                `;
                
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-thread-btn')) return;
                    loadThread(thread.id);
                });
                
                item.querySelector('.delete-thread-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    allThreads = allThreads.filter(t => t.id !== thread.id);
                    if (currentThreadId === thread.id) startNewChat();
                    saveThreads();
                });
                
                sidebarList.appendChild(item);
            });
            lucide.createIcons();
        }

        function startNewChat() {
            currentThreadId = null;
            chatHistory = [];
            
            const msgs = document.querySelectorAll('.message');
            msgs.forEach(m => m.remove());
            emptyState.style.display = 'flex';
            
            renderSidebar();
        }

        function loadThread(id) {
            const thread = allThreads.find(t => t.id === id);
            if (!thread) return;
            
            currentThreadId = id;
            chatHistory = [...thread.history];
            
            const msgs = document.querySelectorAll('.message');
            msgs.forEach(m => m.remove());
            emptyState.style.display = 'none';
            
            chatHistory.forEach(msg => {
                if (msg.parts && msg.parts[0] && msg.parts[0].text) {
                    const text = msg.parts[0].text;
                    const isUser = msg.role === 'user';
                    const msgObj = createMessage(text, isUser, false);
                    if (!isUser) {
                        msgObj.querySelector('.text-content').innerHTML = formatText(text).replace(/\n/g, '<br>');
                    }
                }
            });
            
            renderSidebar();
        }

        // On Load (Always fresh)
        renderSidebar();

        async function handleSend() {
            const text = input.value.trim();
            if(!text || isGenerating) return;

            if(emptyState) emptyState.style.display = 'none';
            input.value = '';
            createMessage(text, true);

            // Register new thread if none active
            if (!currentThreadId) {
                currentThreadId = generateId();
                const newThread = {
                    id: currentThreadId,
                    title: text.substring(0, 30) + (text.length > 30 ? '...' : ''),
                    history: []
                };
                allThreads.unshift(newThread);
            }

            chatHistory.push({ role: "user", parts: [{ text }] });
            
            // Sync locally immediately
            const thread = allThreads.find(t => t.id === currentThreadId);
            if(thread) thread.history = [...chatHistory];
            saveThreads();

            isGenerating = true;
            stopBtn.style.display = 'flex';
            
            const msgObj = createMessage('Thinking...', false);
            const textContainer = msgObj.querySelector('.text-content');
            
            const responseText = await fetchGeminiResponse();
            
            if(!isGenerating) {
                msgObj.remove();
                return;
            }
            
            textContainer.textContent = '';
            const cursor = document.getElementById('current-cursor');
            if(cursor) cursor.remove();

            let i = 0;
            typingInterval = setInterval(() => {
                if(i < responseText.length) {
                    textContainer.textContent += responseText.charAt(i);
                    i++;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                } else {
                    stopGenerating();
                    textContainer.innerHTML = formatText(responseText).replace(/\n/g, '<br>');
                    
                    chatHistory.push({ role: "model", parts: [{ text: responseText }] });
                    
                    const t = allThreads.find(x => x.id === currentThreadId);
                    if(t) t.history = [...chatHistory];
                    saveThreads();
                }
            }, 10);
        }

        function stopGenerating() {
            isGenerating = false;
            stopBtn.style.display = 'none';
            if(typingInterval) clearInterval(typingInterval);
            const cursor = document.getElementById('current-cursor');
            if(cursor) cursor.remove();
        }

        // Events
        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSend();
        });
        btn.addEventListener('click', handleSend);
        stopBtn.addEventListener('click', stopGenerating);
        
        newChatBtn.addEventListener('click', startNewChat);
        clearAllBtn.addEventListener('click', () => {
            if(confirm('Are you sure you want to delete all chat history?')) {
                allThreads = [];
                startNewChat();
                saveThreads();
            }
        });

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                input.value = chip.textContent;
                handleSend();
            });
        });
    </script>
</body>
</html>
