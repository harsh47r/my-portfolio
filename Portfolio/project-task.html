<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task API Demo | Harsh Portfolio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow-x: hidden; }
        .project-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-top: 60px;
        }
        .demo-badge {
            padding: 5px 15px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 20px;
            color: #6366f1;
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .kanban-board {
            width: 100%;
            max-width: 1100px;
            margin-top: 3rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        .kanban-column {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .task-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1rem;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.3s;
        }
        .task-card:active { cursor: grabbing; scale: 0.95; }
        .task-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }
        .task-title { font-weight: 600; margin-bottom: 0.5rem; }
        .task-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); }
        .tag { padding: 3px 8px; border-radius: 4px; background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .tag-urgent { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 999;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: var(--gradient-1); border-color: transparent; scale: 1.1;
        }

        @media (max-width: 768px) {
            .kanban-board { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <canvas id="particle-canvas"></canvas>

    <a href="index.html" class="back-btn"><i data-lucide="arrow-left"></i></a>

    <section class="project-hero container">
        <div class="demo-badge" data-aos="fade-down">REST API UI Client</div>
        <h1 class="hero-title" data-aos="fade-up" data-aos-delay="100">Task <span class="gradient-text">Management API</span></h1>
        <p class="hero-desc" data-aos="fade-up" data-aos-delay="200">A high-performance secure Task tracking logic implementation simulation.</p>

        <div class="kanban-board">
            <!-- To Do -->
            <div class="kanban-column" data-aos="fade-right" data-aos-delay="300">
                <div class="column-header">
                    <span>To Do</span>
                    <span style="color:var(--text-secondary); font-size:0.9rem">3 API</span>
                </div>
                
                <div class="task-card">
                    <div class="task-title">Design DB Schema</div>
                    <div class="task-meta"><span class="tag tag-urgent">High</span><span>Backend</span></div>
                </div>
                <div class="task-card">
                    <div class="task-title">Write Setup Scripts</div>
                    <div class="task-meta"><span class="tag">Low</span><span>DevOps</span></div>
                </div>
            </div>

            <!-- In Progress -->
            <div class="kanban-column" data-aos="fade-up" data-aos-delay="400">
                <div class="column-header">
                    <span>In Progress</span>
                    <span style="color:var(--text-secondary); font-size:0.9rem">1 API</span>
                </div>
                
                <div class="task-card" style="border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);">
                    <div class="task-title">Implement JWT Auth Endpoint</div>
                    <div class="task-meta"><span class="tag tag-urgent">High</span><span>Security</span></div>
                    <div style="margin-top:10px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px;"><div style="width:60%; height:100%; background:#6366f1; border-radius:2px; animation: progress 2s infinite alternate;"></div></div>
                </div>
            </div>

            <!-- Done -->
            <div class="kanban-column" data-aos="fade-left" data-aos-delay="500">
                <div class="column-header">
                    <span>Done</span>
                    <span style="color:var(--text-secondary); font-size:0.9rem">2 API</span>
                </div>
                
                <div class="task-card" style="opacity: 0.7;">
                    <div class="task-title" style="text-decoration: line-through;">Initialize Repository</div>
                    <div class="task-meta"><span class="tag">Done</span><span>Config</span></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Essential Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        lucide.createIcons();
    </script>
</body>
</html>
